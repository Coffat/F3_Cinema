version: '3.8'

services:
  f3_cinema_db:
    image: mysql:8.4
    container_name: f3_cinema_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: '123456'
      MYSQL_DATABASE: 'f3_cinema'
      MYSQL_USER: 'f3_admin'
      MYSQL_PASSWORD: 'f3_password'
    ports:
      - '3306:3306'
    volumes:
      - ./src/main/resources/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
      - f3_cinema_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  f3_cinema_mysql_data:
    driver: local
