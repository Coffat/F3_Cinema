version: '3.8'

services:
  f3_cinema_db:
    build:
      context: .
      dockerfile: Dockerfile.mysql
    container_name: f3_cinema_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: '123456'
      MYSQL_DATABASE: 'f3_cinema'
      MYSQL_USER: 'f3_admin'
      MYSQL_PASSWORD: 'f3_password'
    ports:
      - '3306:3306'
    # Gỡ bỏ volume persistent để DB được reset mỗi lần có thay đổi SQL
    # volumes:
    #   - f3_cinema_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    develop:
      watch:
        - action: rebuild
          path: ./src/main/resources/sql/init.sql

